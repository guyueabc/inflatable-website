<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify — InflatableModel.CN</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Inflatable<span>Model</span></a>
            <div class="nav-links"><a href="/login">Login</a></div>
        </div>
    </nav>

    <div class="page-section-sm" style="padding-top: 80px;">
        <h2 class="section-title text-center">Verify Your Email</h2>
        <p class="section-subtitle text-center">
            We sent a 6-digit code to <strong>{{ email }}</strong>
        </p>

        <div class="card">
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" maxlength="6" placeholder="123456" class="verify-code-input">
            </div>
            <button class="btn btn-primary btn-full" onclick="verifyCode()" id="verifyBtn">Verify</button>
            <div id="verifyError" class="error-msg" style="display:none;"></div>
            <p class="text-center mt-4 text-sm">
                <a href="#" onclick="resendCode()" style="color:var(--primary);">Resend code</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('code').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            if (code.length !== 6) { showError('Please enter the 6-digit code.'); return; }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const resp = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/generate';
                } else {
                    showError(data.error || 'Invalid code.');
                }
            } catch (e) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify';
            }
        }

        async function resendCode() {
            try {
                const resp = await fetch('/api/resend-code', { method: 'POST' });
                const data = await resp.json();
                alert(data.ok ? 'New code sent (demo: 123456).' : (data.error || 'Failed.'));
            } catch (e) {
                alert('Network error.');
            }
        }

        function showError(msg) {
            const el = document.getElementById('verifyError');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
