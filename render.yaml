services:
  - type: web
    name: inflatable-model
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: HUNYUAN_ENDPOINT
        value: https://api.ai3d.cloud.tencent.com
      - key: HUNYUAN_MODEL
        value: "3.0"
    disk:
      name: data
      mountPath: /opt/render/data
      sizeGB: 1
