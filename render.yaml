services:
  - type: web
    name: inflatable-model
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: HUNYUAN_ENDPOINT
        value: https://api.ai3d.cloud.tencent.com
      - key: HUNYUAN_MODEL
        value: "3.0"
      - key: DATABASE_PATH
        value: /opt/render/project/data/data.db
      - key: UPLOAD_DIR
        value: /opt/render/project/data/uploads
      - key: SESSION_DIR
        value: /opt/render/project/data/flask_session
    disk:
      name: app-data
      mountPath: /opt/render/project/data
      sizeGB: 1